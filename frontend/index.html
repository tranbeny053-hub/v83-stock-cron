<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ultimate Crypto Probability Engine</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar" aria-label="App header">
        <div>
          <p class="eyebrow">Analysis-only terminal</p>
          <h1>Ultimate Crypto Probability Engine</h1>
        </div>
        <div class="status-pill" id="sessionStatus">Locked</div>
      </section>

      <section class="login-panel" id="loginPanel">
        <form id="loginForm" class="control-row">
          <label for="accessCode">Access code</label>
          <input id="accessCode" name="code" type="password" autocomplete="current-password" />
          <button type="submit">Login</button>
        </form>
        <p class="muted">Analysis-only. No account actions or autonomous execution.</p>
      </section>

      <section class="workspace hidden" id="workspace">
        <nav class="tabs" aria-label="Mode">
          <button class="tab active" data-tab="single">Single Crypto Analysis</button>
          <button class="tab" data-tab="batch">Batch Crypto Analysis</button>
          <button class="tab" data-tab="dev">Dev Mode</button>
        </nav>

        <section class="panel" id="singlePanel">
          <form id="singleForm" class="analysis-form">
            <label>
              Symbol
              <input name="symbol" value="BTC" autocomplete="off" />
            </label>
            <label>
              Analysis mode
              <select name="analysis_mode">
                <option value="METRICS_ONLY">METRICS_ONLY</option>
                <option value="NEWS_ADDON">NEWS_ADDON</option>
              </select>
            </label>
            <label>
              Timeframe
              <select name="timeframe">
                <option>15m</option>
                <option>1H</option>
                <option selected>4H</option>
                <option>1D</option>
                <option>1W</option>
              </select>
            </label>
            <button type="submit">Analyze</button>
          </form>
          <div class="loading hidden" id="singleLoading">
            <span>Normalizing</span><span>Validating</span><span>Computing</span><span>Rendering</span>
          </div>
          <div id="singleResult" class="result-grid"></div>
        </section>

        <section class="panel hidden" id="batchPanel">
          <form id="batchForm" class="analysis-form stacked">
            <label>
              Symbols, one per line
              <textarea name="symbols" rows="5">BTC&#10;ETH</textarea>
            </label>
            <div class="control-row">
              <label>
                Analysis mode
                <select name="analysis_mode">
                  <option value="METRICS_ONLY">METRICS_ONLY</option>
                  <option value="NEWS_ADDON">NEWS_ADDON</option>
                </select>
              </label>
              <label>
                Timeframe
                <select name="timeframe">
                  <option>15m</option>
                  <option>1H</option>
                  <option selected>4H</option>
                  <option>1D</option>
                  <option>1W</option>
                </select>
              </label>
              <button type="submit">Analyze Batch</button>
            </div>
          </form>
          <div class="loading hidden" id="batchLoading">
            <span>Queueing</span><span>Isolating failures</span><span>Rendering backend fields</span>
          </div>
          <div id="batchResult" class="result-grid"></div>
        </section>

        <section class="panel hidden" id="devPanel">
          <form id="devForm" class="control-row">
            <label for="devCode">Dev Mode code</label>
            <input id="devCode" name="code" type="password" autocomplete="current-password" />
            <button type="submit">Re-auth</button>
          </form>
          <div class="control-row">
            <button id="loadRuns" type="button">Load Runs</button>
          </div>
          <div id="devResult" class="terminal-output"></div>
        </section>
      </section>
    </main>
    <template id="overviewTemplate">
      <article class="result-card">
        <header>
          <h2></h2>
          <button class="detail-button" type="button">Detail</button>
        </header>
        <dl></dl>
        <p class="news-note"></p>
      </article>
    </template>
    <script src="/app.js" type="module"></script>
  </body>
</html>
