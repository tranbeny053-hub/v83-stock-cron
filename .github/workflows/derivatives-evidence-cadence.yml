name: UCPE Derivatives Evidence Collector

on:
  workflow_dispatch:
    inputs:
      enable_collector:
        description: "Explicitly enable this one manual collector process"
        type: boolean
        default: false
        required: true
      dry_run:
        description: "Analyze without constructing a production repository or writing"
        type: boolean
        default: true
        required: true
      matrix_scope:
        description: "Bounded symbol/timeframe matrix"
        type: choice
        options:
          - FULL_4_CELL
          - BTC_ONLY
          - ETH_ONLY
        default: FULL_4_CELL
        required: true
      confirm_write:
        description: "Write mode requires the exact confirmation token"
        type: string
        default: ""
        required: false

permissions:
  contents: read

concurrency:
  group: derivatives-evidence-cadence
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run manual derivatives evidence collector
        env:
          PYTHONPATH: src
          UCPE_DERIV_CADENCE_ENABLED: ${{ inputs.enable_collector }}
          COLLECTOR_DRY_RUN: ${{ inputs.dry_run }}
          COLLECTOR_MATRIX_SCOPE: ${{ inputs.matrix_scope }}
          COLLECTOR_CONFIRM_WRITE: ${{ inputs.confirm_write }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          python scripts/collect_derivatives_evidence.py \
            --dry-run "${COLLECTOR_DRY_RUN}" \
            --matrix-scope "${COLLECTOR_MATRIX_SCOPE}" \
            --confirm-write "${COLLECTOR_CONFIRM_WRITE}"
